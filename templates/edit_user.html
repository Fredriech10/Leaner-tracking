<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; color: #222; }

        .topbar { background: #005a9e; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .topbar h1 { margin: 0; font-size: 1.15em; }
        .topbar-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .topbar-links a { color: white; text-decoration: none; font-size: 0.88em; opacity: 0.85; }
        .topbar-links a:hover { opacity: 1; text-decoration: underline; }

        .page { padding: 20px 24px; max-width: 800px; margin: 0 auto; }

        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #ddd; margin-bottom: 16px; }
        .card h3 { margin: 0 0 18px 0; font-size: 1.1em; color: #005a9e; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 6px; color: #333; font-size: 0.9em; }
        .form-group input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95em; }
        .form-group input[type="text"]:focus { outline: none; border-color: #005a9e; box-shadow: 0 0 0 3px rgba(0, 90, 158, 0.1); }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-primary { background: #005a9e; color: white; }
        .btn-primary:hover { background: #004578; }
        .btn-secondary { background: #666; color: white; margin-left: 8px; }
        .btn-secondary:hover { background: #555; }

        .user-info { background: #f5f5f5; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; }
        .user-info .username { font-size: 1.2em; font-weight: bold; color: #005a9e; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <h1>✏️ Edit User</h1>
    <div class="topbar-links">
        <a href="/learner_record/{{ user[0] }}">← Back to Learner Record</a>
        <a href="/admin">Admin Panel</a>
        <a href="/teacher_dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="page">

<div class="card">
    <h3>Edit User Details</h3>
    
    <div class="user-info">
        <div class="username">{{ user[0] }}</div>
    </div>

    <form method="POST" action="">
        <input type="hidden" name="next" value="{{ next_url or '' }}">
        
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{ user[1] or '' }}" placeholder="Enter full name">
        </div>
        
        <div class="form-group">
            <label for="group_name">Group</label>
            <input type="text" id="group_name" name="group_name" value="{{ user[2] or '' }}" placeholder="Enter group name">
        </div>
        
        <div style="display: flex; gap: 8px;">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="{{ next_url or '/admin' }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

</div>

</body>
</html>
