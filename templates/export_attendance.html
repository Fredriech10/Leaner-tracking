<!DOCTYPE html>
<html lang="en">
<head>
    <title>Export Attendance</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; color: #222; }
        .topbar { background: #005a9e; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap; gap: 10px; position: sticky; top: 0; z-index: 999; }
        .topbar h1 { margin: 0; font-size: 1.05em; white-space: nowrap; }
        .topbar-links { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; }
        .topbar-links a { color: white; text-decoration: none; font-size: 0.82em; opacity: 0.9; white-space: nowrap; }
        .topbar-links a:hover { opacity: 1; text-decoration: underline; }
        .topbar-user { color: white; font-size: 0.82em; white-space: nowrap; border-left: 1px solid rgba(255,255,255,0.35); padding-left: 10px; }
        .topbar-user a { color: white; text-decoration: none; font-weight: bold; }
        .topbar-user a:hover { text-decoration: underline; }
        .page { padding: 20px 24px; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #ddd; margin-bottom: 20px; }
        .card h2 { margin: 0 0 20px 0; font-size: 1.2em; color: #005a9e; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 0.9em; }
        input[type="date"] { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding: 12px; background: #f9f9f9; border-radius: 6px; border: 1px solid #ddd; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .checkbox-item label { margin: 0; cursor: pointer; font-weight: normal; font-size: 0.9em; }
        .btn { padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-primary { background: #005a9e; color: white; }
        .btn-primary:hover { background: #004578; }
        .btn-secondary { background: #666; color: white; }
        .btn-secondary:hover { background: #555; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>📊 Export Attendance</h1>
    <div class="topbar-links">
        <a href="/teacher_dashboard">← Dashboard</a>
        <a href="/attendance">📅 Attendance</a>
        <span class="topbar-user">👤 <a href="/edit_user/{{ session_username }}">{{ session_username }}</a></span>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="page">
    <div class="card">
        <h2>📊 Export Attendance Data</h2>
        <p style="color:#555; font-size:0.9em; margin-top:0;">Each group will be exported as a separate sheet in the Excel file.</p>

        <form method="POST" action="/export_attendance_multi" id="exportForm">
            <div class="form-group">
                <label>Date Range</label>
                <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                    <div>
                        <label style="font-weight:normal; font-size:0.85em;">Start Date</label>
                        <input type="date" name="start_date" required>
                    </div>
                    <div>
                        <label style="font-weight:normal; font-size:0.85em;">End Date</label>
                        <input type="date" name="end_date" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Select Groups</label>
                <div class="checkbox-grid">
                    {% for group in all_groups %}
                    <div class="checkbox-item">
                        <input type="checkbox" name="groups" value="{{ group }}" id="grp_{{ loop.index }}" checked>
                        <label for="grp_{{ loop.index }}">{{ group }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <a href="/teacher_dashboard" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">📥 Export to Excel</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('exportForm').addEventListener('submit', function() {
    setTimeout(function() { window.location.href = '/teacher_dashboard'; }, 1000);
});
</script>

</body>
</html>
